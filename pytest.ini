[pytest]
DJANGO_SETTINGS_MODULE = config.settings.dev

python_files = tests/test_*.py apps/**/tests/test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers

markers =
    slow: marks tests as slow (run separately with -m slow)
    integration: marks full integration tests that require all services
